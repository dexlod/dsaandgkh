<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Комментарии</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://st.max.ru/js/max-web-app.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <button class="back-btn" id="backBtn" type="button">←</button>

        <div class="topbar-center">
          <div class="comments-count-pill" id="commentsCountPill">0 комментариев</div>
        </div>

        <button class="icon-btn" id="refreshBtn" type="button" title="Обновить">⟳</button>
      </header>

      <main class="content">
        <section class="meta-card">
          <div class="meta-title">Обсуждение новости</div>
          <div class="meta-subtitle" id="postIdSubtitle">Загрузка...</div>
        </section>

        <section class="comments-list" id="commentsList"></section>
      </main>

      <footer class="composer">
        <textarea
          id="commentInput"
          class="composer-input"
          rows="1"
          placeholder="Написать комментарий..."
          maxlength="1000"
        ></textarea>
        <button id="sendBtn" class="send-btn" type="button">➤</button>
      </footer>
    </div>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
