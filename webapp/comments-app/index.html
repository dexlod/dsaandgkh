<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Комментарии</title>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="topbar-pill" id="commentsCountPill">0 комментариев</div>
      </header>

      <main class="content">
        <section class="home-screen" id="homeScreen" hidden>
          <div class="hero-card">
            <div class="hero-badge">Официальный бот</div>
            <h1 class="hero-title">Добро пожаловать</h1>
            <p class="hero-text" id="heroText"></p>
            <div class="hero-points" id="heroPoints"></div>
          </div>

          <section class="tabs-card">
            <div class="tabs-header">
              <div class="tabs-title">Подведомственные учреждения</div>
              <div class="tabs-subtitle">
                Краткая информация по ключевым организациям департамента
              </div>
            </div>

            <div class="tabs-switcher" id="enterpriseTabs"></div>

            <div class="enterprise-card" id="enterpriseCard">
              <div class="enterprise-image-wrap">
                <img id="enterpriseImage" class="enterprise-image" alt="" />
              </div>

              <div class="enterprise-body">
                <div class="enterprise-name" id="enterpriseName"></div>
                <div class="enterprise-description" id="enterpriseDescription"></div>
                <div class="enterprise-features" id="enterpriseFeatures"></div>
              </div>
            </div>
          </section>
        </section>

        <section class="post-card" id="postCard">
          <div class="post-card-text" id="postText">Загрузка публикации...</div>
          <div class="post-media-grid" id="postMediaGrid"></div>
          <div class="post-media-meta" id="postMediaMeta"></div>
        </section>

        <section class="comments-list" id="commentsList"></section>
      </main>

      <footer class="composer" id="composer">
        <textarea
          id="commentInput"
          class="composer-input"
          rows="1"
          placeholder="Написать комментарий..."
          maxlength="1000"
        ></textarea>
        <button id="sendBtn" class="send-btn" type="button">➤</button>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
